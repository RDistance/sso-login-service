server:
  port: 8081

spring:
  application:
    name: sso-login-service

  datasource:
    url: jdbc:mysql://localhost:3306/sso_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# SSO 自定义配置
sso:
  jwt:
    secret: sso-login-service-jwt-secret-key-change-in-production-2026
    access-token-expiration: 7200000    # 2小时 (ms)
    refresh-token-expiration: 604800000  # 7天 (ms)
  code:
    expiration: 300000                  # 授权码有效期 5分钟 (ms)
  session:
    expiration: 86400000                # 全局Session有效期 24小时 (ms)
  frontend:
    url: http://localhost:5173          # SSO Vue 前端地址（开发模式）
